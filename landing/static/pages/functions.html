<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Function Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --surface:  rgba(255,255,255,0.04);
      --border:   rgba(255,255,255,0.08);
      --text:     #e2e8f0;
      --muted:    rgba(255,255,255,0.35);
      --accent:   #fbbf24;
    }

    html, body {
      height: 100%; overflow: hidden;
      background: #07101C url('/gradient-background-dark.svg') center/cover no-repeat fixed;
      color: var(--text);
      font-family: 'Inter', -apple-system, sans-serif;
    }

    #app { display: flex; height: 100vh; }

    .pane { display: flex; flex-direction: column; overflow: hidden; }

    #builder-pane { width: 55%; border-right: 1px solid var(--border); }
    #code-pane    { flex: 1; }

    .pane-head {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      background: rgba(5,11,22,0.8);
    }
    .pane-title {
      font-size: 11px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; color: var(--muted);
    }
    .btn-group { margin-left: auto; display: flex; gap: 6px; }
    .btn {
      padding: 5px 12px; border-radius: 7px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text); font-size: 12px; font-weight: 500;
      font-family: inherit; cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); }
    .btn-accent {
      border-color: rgba(251,191,36,0.4);
      background: rgba(251,191,36,0.08);
      color: var(--accent);
    }
    .btn-accent:hover { background: rgba(251,191,36,0.15); }
    .btn-accent.copied { color: #4ade80; border-color: rgba(74,222,128,0.4); background: rgba(74,222,128,0.08); }

    /* Input variable row */
    #input-var-row {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      background: rgba(5,11,22,0.5);
    }
    #input-var-label {
      font-size: 11px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; color: var(--muted); flex-shrink: 0;
    }
    #input-var {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px; padding: 5px 10px;
      color: var(--accent);
      font-family: 'JetBrains Mono', 'Fira Code', Menlo, monospace;
      font-size: 13px; outline: none; width: 220px;
    }
    #input-var:focus { border-color: rgba(251,191,36,0.4); }
    #input-var-hint {
      font-size: 11px; color: var(--muted);
      font-family: 'JetBrains Mono', 'Fira Code', Menlo, monospace;
    }

    /* Table area */
    #table-scroll {
      flex: 1; overflow: auto; padding: 14px;
    }
    #table-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
    #table-scroll::-webkit-scrollbar-track { background: transparent; }
    #table-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

    table { border-collapse: collapse; font-size: 13px; min-width: 100%; }

    thead tr { background: rgba(5,11,22,0.7); }
    tr:hover td { background: rgba(255,255,255,0.02); }

    th, td { border: 1px solid var(--border); }

    th { font-weight: 600; }

    /* Input column header (fixed label) */
    .th-input-fixed {
      padding: 7px 10px;
      font-size: 10px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; color: var(--muted);
      white-space: nowrap; width: 130px;
    }

    /* Variable column headers (editable) */
    .th-var { min-width: 120px; }
    .th-var-inner {
      display: flex; align-items: center; gap: 4px;
      padding: 4px 4px 4px 8px;
    }
    .col-name-input {
      background: transparent; border: none;
      color: var(--accent);
      font-family: 'JetBrains Mono', 'Fira Code', Menlo, monospace;
      font-size: 12px; font-weight: 600; outline: none;
      width: 100%; min-width: 60px;
    }
    .col-name-input::placeholder { color: rgba(251,191,36,0.3); }
    .col-del-btn {
      flex-shrink: 0; background: none; border: none;
      color: rgba(255,255,255,0.2); cursor: pointer;
      font-size: 13px; padding: 2px 4px; line-height: 1;
    }
    .col-del-btn:hover { color: #f87171; }

    /* Add column header cell */
    .th-add-col { width: 36px; text-align: center; }
    .add-col-btn {
      background: none; border: none;
      color: rgba(255,255,255,0.25);
      cursor: pointer; font-size: 20px; line-height: 1;
      padding: 4px 8px; width: 100%;
    }
    .add-col-btn:hover { color: var(--accent); }

    /* Action column (copy + delete) */
    .td-del { width: 56px; text-align: center; white-space: nowrap; }
    .row-copy-btn, .row-del-btn {
      background: none; border: none;
      cursor: pointer; font-size: 13px;
      padding: 4px 5px; line-height: 1;
    }
    .row-copy-btn { color: rgba(255,255,255,0.2); }
    .row-copy-btn:hover { color: var(--accent); }
    .row-copy-btn.ok { color: #4ade80; }
    .row-del-btn { color: rgba(255,255,255,0.2); }
    .row-del-btn:hover { color: #f87171; }

    /* Add row footer row */
    .tr-add-row td {
      padding: 0;
      border-top: 1px dashed rgba(255,255,255,0.08);
      border-bottom: none; border-left: none; border-right: none;
    }
    .add-row-btn {
      display: block; width: 100%; text-align: right;
      background: none; border: none;
      color: rgba(255,255,255,0.3);
      font-size: 12px; font-weight: 600; font-family: inherit;
      cursor: pointer; padding: 8px 14px;
      transition: color 0.15s;
    }
    .add-row-btn:hover { color: var(--accent); }

    /* Data cells */
    .cell-input {
      display: block; width: 100%;
      background: transparent; border: none;
      color: var(--text);
      font-family: 'JetBrains Mono', 'Fira Code', Menlo, monospace;
      font-size: 12px; outline: none;
      padding: 7px 8px;
    }
    .cell-input::placeholder { color: rgba(255,255,255,0.15); }
    .cell-input:focus { background: rgba(255,255,255,0.03); }
    .td-input-val .cell-input { color: #60a5fa; }

    /* Code pane */
    #code-output {
      flex: 1; overflow-y: auto;
      padding: 14px 16px;
      font-family: 'JetBrains Mono', 'Fira Code', Menlo, monospace;
      font-size: 12.5px; line-height: 1.75;
      white-space: pre;
    }
    #code-output::-webkit-scrollbar { width: 6px; }
    #code-output::-webkit-scrollbar-track { background: transparent; }
    #code-output::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

    /* Python syntax colors */
    .py-kw   { color: #f472b6; }
    .py-fn   { color: #60a5fa; }
    .py-str  { color: #4ade80; }
    .py-var  { color: #fbbf24; }
    .py-key  { color: #e2e8f0; }
    .py-val  { color: #4ade80; }
    .py-null { color: #94a3b8; }
    .py-muted { color: rgba(255,255,255,0.3); }

    @media (max-width: 640px) {
      #app { flex-direction: column; }
      #builder-pane { width: 100%; height: 55%; border-right: none; border-bottom: 1px solid var(--border); }
      #code-pane { height: 45%; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ── Builder pane ── -->
  <div class="pane" id="builder-pane">
    <div class="pane-head">
      <span class="pane-title">Lookup Builder</span>
    </div>

    <div id="input-var-row">
      <span id="input-var-label">Input Variable</span>
      <input id="input-var" type="text" placeholder="str_DNIS" spellcheck="false" oninput="generate()" />
      <span id="input-var-hint">request.data['inputs'][…]</span>
    </div>

    <div id="table-scroll">
      <table id="lookup-table">
        <thead id="t-head"></thead>
        <tbody id="t-body"></tbody>
        <tfoot id="t-foot"></tfoot>
      </table>
    </div>
  </div>

  <!-- ── Code pane ── -->
  <div class="pane" id="code-pane">
    <div class="pane-head">
      <span class="pane-title">Generated Code</span>
      <div class="btn-group">
        <button class="btn btn-accent" id="copy-btn" onclick="copyCode()">Copy</button>
      </div>
    </div>
    <div id="code-output"></div>
  </div>

</div>
<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let cols = ['Var1', 'Var2'];
  let rows = [
    { input: 'input1', vals: ['value', 'value'] },
    { input: 'input2', vals: ['value', 'value'] },
  ];

  // ── Column operations ──────────────────────────────────────────────────────
  function addColumn() {
    cols.push('Var' + (cols.length + 1));
    rows.forEach(r => r.vals.push(''));
    renderTable();
    generate();
  }

  function deleteColumn(i) {
    if (cols.length <= 1) return;
    cols.splice(i, 1);
    rows.forEach(r => r.vals.splice(i, 1));
    renderTable();
    generate();
  }

  function addRow() {
    rows.push({ input: '', vals: cols.map(() => '') });
    renderTable();
    generate();
  }

  function deleteRow(i) {
    if (rows.length <= 1) return;
    rows.splice(i, 1);
    renderTable();
    generate();
  }

  // ── Table render ───────────────────────────────────────────────────────────
  function renderTable() {
    const thead = document.getElementById('t-head');
    const tbody = document.getElementById('t-body');
    const tfoot = document.getElementById('t-foot');
    const totalCols = cols.length + 3; // Input + vars + add-col + actions

    thead.innerHTML = `<tr>
      <th class="th-input-fixed">Input</th>
      ${cols.map((c, i) => `
        <th class="th-var">
          <div class="th-var-inner">
            <input class="col-name-input" value="${esc(c)}" placeholder="Var${i+1}"
              oninput="cols[${i}]=this.value;generate()">
            ${cols.length > 1
              ? `<button class="col-del-btn" onclick="deleteColumn(${i})" title="Remove column">✕</button>`
              : ''}
          </div>
        </th>`).join('')}
      <th class="th-add-col">
        <button class="add-col-btn" onclick="addColumn()" title="Add column">+</button>
      </th>
      <th class="td-del"></th>
    </tr>`;

    tbody.innerHTML = rows.map((row, ri) => `
      <tr>
        <td class="td-input-val">
          <input class="cell-input" data-ri="${ri}" data-ci="-1" value="${esc(row.input)}" placeholder="input${ri+1}"
            oninput="rows[${ri}].input=this.value;generate()">
        </td>
        ${cols.map((_, ci) => `
          <td>
            <input class="cell-input" data-ri="${ri}" data-ci="${ci}" value="${esc(row.vals[ci]||'')}" placeholder="value"
              oninput="rows[${ri}].vals[${ci}]=this.value;generate()">
          </td>`).join('')}
        <td></td>
        <td class="td-del">
          <button class="row-copy-btn" id="row-copy-${ri}" onclick="copyRow(${ri})" title="Copy row">⎘</button>
          ${rows.length > 1
            ? `<button class="row-del-btn" onclick="deleteRow(${ri})" title="Remove row">✕</button>`
            : ''}
        </td>
      </tr>`).join('');

    tfoot.innerHTML = `<tr class="tr-add-row">
      <td colspan="${totalCols}">
        <button class="add-row-btn" onclick="addRow()">+ Add Row</button>
      </td>
    </tr>`;
  }

  // ── Code generation ────────────────────────────────────────────────────────
  let rawCode = '';

  function generate() {
    const inputVar   = document.getElementById('input-var').value.trim() || 'str_DNIS';
    const lookupName = inputVar.replace(/^(str|int|bool|dec|date)_/i, '').toLowerCase() + '_lookup';
    const colNames   = cols.map(c => c.trim() || 'Var');

    const entries = rows.map(row => {
      const key  = row.input || '';
      const pairs = colNames.map((col, i) => `"${col}": "${row.vals[i] || ''}"`).join(', ');
      return `        "${key}": {${pairs}}`;
    }).join(',\n');

    const nullPairs = colNames.map(col => `"${col}": "Null"`).join(', ');

    rawCode = [
      `from models import Request, Response`,
      ``,
      `def handle(request: Request, response: Response):`,
      ``,
      `    ${inputVar} = request.data['inputs']['${inputVar}']`,
      ``,
      `    ${lookupName} = {`,
      entries + `,`,
      `    }`,
      ``,
      `    if ${inputVar} in ${lookupName}:`,
      `        response.data = ${lookupName}[${inputVar}]`,
      `    else:`,
      `        response.data = {${nullPairs}}`,
      ``,
      `    return response`,
    ].join('\n');

    renderCode(rawCode, inputVar, lookupName, colNames);
  }

  function renderCode(code, inputVar, lookupName, colNames) {
    // Build highlighted HTML line by line
    const lines = code.split('\n');
    const html = lines.map(line => highlightLine(line, inputVar, lookupName, colNames)).join('\n');
    document.getElementById('code-output').innerHTML = html;
  }

  function highlightLine(line, inputVar, lookupName, colNames) {
    // Escape first
    let s = esc(line);

    // import line
    if (s.startsWith('from ') || s.startsWith('import ')) {
      return s
        .replace(/^(from|import)/, '<span class="py-kw">$1</span>')
        .replace(/(Request|Response)/g, '<span class="py-fn">$1</span>');
    }

    // def line
    if (/^\s*def /.test(s)) {
      return s
        .replace(/def/, '<span class="py-kw">def</span>')
        .replace(/handle/, '<span class="py-fn">handle</span>')
        .replace(/(request|response): (Request|Response)/g,
          '<span class="py-var">$1</span>: <span class="py-fn">$2</span>');
    }

    // if/else lines
    if (/^\s*(if|else):/.test(s)) {
      return s
        .replace(/(if|else)/, '<span class="py-kw">$1</span>')
        .replace(new RegExp(esc(inputVar), 'g'), `<span class="py-var">${esc(inputVar)}</span>`)
        .replace(new RegExp(esc(lookupName), 'g'), `<span class="py-fn">${esc(lookupName)}</span>`);
    }

    // return line
    if (/^\s*return /.test(s)) {
      return s.replace(/return/, '<span class="py-kw">return</span>');
    }

    // assignment: inputVar = request.data[...]
    if (s.includes(`${esc(inputVar)} = request`)) {
      return s
        .replace(new RegExp(esc(inputVar)), `<span class="py-var">${esc(inputVar)}</span>`)
        .replace(/request/, '<span class="py-var">request</span>')
        .replace(/&#x27;inputs&#x27;/, `<span class="py-str">'inputs'</span>`)
        .replace(new RegExp(`&#x27;${esc(inputVar)}&#x27;`), `<span class="py-str">'${esc(inputVar)}'</span>`);
    }

    // lookup assignment line
    if (s.includes(`${esc(lookupName)} = {`)) {
      return s.replace(new RegExp(esc(lookupName)), `<span class="py-fn">${esc(lookupName)}</span>`);
    }

    // response.data assignment
    if (s.includes('response.data')) {
      return s
        .replace(/response/, '<span class="py-var">response</span>')
        .replace(new RegExp(esc(lookupName), 'g'), `<span class="py-fn">${esc(lookupName)}</span>`)
        .replace(new RegExp(`<span class="py-var">response</span>\\.data = \\{(.+?)\\}$`),
          `<span class="py-var">response</span>.data = {$1}`)
        .replace(new RegExp(esc(inputVar), 'g'), `<span class="py-var">${esc(inputVar)}</span>`);
    }

    // dict entry line: "key": {"Col": "val", ...}
    if (/^\s+&quot;.+&quot;: \{/.test(s)) {
      return s
        .replace(/^(\s+)(&quot;[^&]+&quot;)(: )(\{)/, '$1<span class="py-str">$2</span>$3$4')
        .replace(/&quot;([^&]+)&quot;: &quot;([^&]*)&quot;/g,
          '<span class="py-key">&quot;$1&quot;</span>: <span class="py-val">&quot;$2&quot;</span>');
    }

    // else response.data fallback line (Null values)
    if (/Null/.test(s)) {
      return s.replace(/&quot;Null&quot;/g, '<span class="py-null">&quot;Null&quot;</span>');
    }

    return s;
  }

  function copyCode() {
    navigator.clipboard.writeText(rawCode).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
    });
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#x27;');
  }

  // ── Copy row ───────────────────────────────────────────────────────────────
  function copyRow(ri) {
    const row = rows[ri];
    const colNames = cols.map(c => c.trim() || 'Var');
    const pairs = colNames.map((col, i) => `"${col}": "${row.vals[i] || ''}"`).join(', ');
    const text = `"${row.input || ''}": {${pairs}}`;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('row-copy-' + ri);
      if (btn) { btn.classList.add('ok'); setTimeout(() => btn.classList.remove('ok'), 1200); }
    });
  }

  // ── Excel/spreadsheet paste ────────────────────────────────────────────────
  document.getElementById('lookup-table').addEventListener('paste', function(e) {
    const target = e.target;
    if (!target.classList.contains('cell-input')) return;

    const text = (e.clipboardData || window.clipboardData).getData('text');
    if (!text.includes('\t') && !text.includes('\n') && !text.includes('\r')) return;

    e.preventDefault();

    const startRi = parseInt(target.dataset.ri);
    const startCi = parseInt(target.dataset.ci); // -1 = Input col, 0+ = var cols

    const pastedRows = text.split(/\r?\n|\r/).filter(r => r.length > 0);

    // Grow rows array as needed
    while (rows.length < startRi + pastedRows.length) {
      rows.push({ input: '', vals: cols.map(() => '') });
    }

    pastedRows.forEach((rowText, rowOffset) => {
      const cells = rowText.split('\t');
      const ri = startRi + rowOffset;

      cells.forEach((cellVal, colOffset) => {
        const ci = startCi + colOffset;
        if (ci === -1) {
          rows[ri].input = cellVal.trim();
        } else if (ci >= 0) {
          // Grow columns as needed
          while (cols.length <= ci) {
            cols.push('Var' + (cols.length + 1));
            rows.forEach(r => { while (r.vals.length <= ci) r.vals.push(''); });
          }
          rows[ri].vals[ci] = cellVal.trim();
        }
      });
    });

    renderTable();
    generate();
  });

  // ── Init ───────────────────────────────────────────────────────────────────
  renderTable();
  generate();
</script>
</body>
</html>
